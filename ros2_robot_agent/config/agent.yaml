# Robot Agent Configuration
# 환경변수로 오버라이드 가능: ${VAR:-default}
#
# 사용법:
#   ros2 launch ros2_robot_agent robot_agent.launch.py server_ip:=192.168.0.100
#   ros2 launch ros2_robot_agent robot_agent.launch.py server_ip:=192.168.0.100 agent_id:=agent_02

# Agent identification
# id와 name을 비워두면 server가 자동으로 할당합니다
# - id: hardware fingerprint 기반으로 서버가 UUID 할당
# - name: "Agent-001", "Agent-002" 등 순차적으로 서버가 할당
agent:
  id: ""  # Server-assigned ID 사용 (재시작 시에도 동일한 에이전트로 인식)
  name: ""  # Server-assigned name 사용 (빈 값 또는 "Robot Agent"면 서버가 자동 할당)
  use_server_assigned_id: true

# Server connection
server:
  url: "http://${ROBOT_AGENT_SERVER_IP:-localhost}:8081"
  quic:
    server_address: "${ROBOT_AGENT_SERVER_IP:-localhost}"
    server_port: ${ROBOT_AGENT_SERVER_PORT:-9444}
    alpn: "robot-agent-raw"
    # 인증서 경로 (패키지 상대 경로 사용)
    ca_cert: "${ROBOT_AGENT_PKG_PATH:-/etc/robot_agent}/certs/ca.crt"
    client_cert: "${ROBOT_AGENT_PKG_PATH:-/etc/robot_agent}/certs/agent.crt"
    client_key: "${ROBOT_AGENT_PKG_PATH:-/etc/robot_agent}/certs/agent.key"
    idle_timeout_ms: 30000
    keepalive_interval_ms: 10000
    handshake_timeout_ms: 10000
    max_bidi_streams: 1000
    max_uni_streams: 100
    enable_0rtt: true
    enable_datagrams: true

# Communication settings
communication:
  heartbeat_interval_ms: 100
  command_timeout_sec: 30

# Execution settings
execution:
  action_default_timeout_sec: 120.0
  precondition_check_interval_ms: 100
  max_concurrent_per_robot: 1

# Storage paths
storage:
  behavior_trees_path: "/tmp/robot_agent/graphs"
  state_definitions_path: "/tmp/robot_agent/state_definitions"
  state_persistence_path: "/tmp/robot_agent/state"
  message_queue_path: "/tmp/robot_agent/queue"
  agent_id_path: "/tmp/robot_agent/agent_id"  # Server-assigned ID 저장 경로
  enable_state_persistence: false
  enable_message_persistence: false

# ROS settings
ros:
  node_name: "robot_agent"
  use_intra_process: true
  executor_thread_count: 2

# Logging
logging:
  level: "${ROBOT_AGENT_LOG_LEVEL:-info}"
  file: ""
  console: true
  include_timestamp: true

# Robots (optional) - declare IDs and namespaces for execution
# robots:
#   - id: "robot_001"
#     name: "AMR Robot 1"
#     namespace: "/robot_001"
