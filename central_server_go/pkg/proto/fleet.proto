syntax = "proto3";

package fleet;

option go_package = "central_server_go/pkg/proto";

// FleetControl - Central command and control service
service FleetControl {
  // Bidirectional streaming for real-time command/result exchange
  rpc CommandStream(stream AgentMessage) returns (stream ServerMessage);

  // Agent registration on connection
  rpc RegisterAgent(RegisterAgentRequest) returns (RegisterAgentResponse);

  // Direct result reporting (fallback for non-streaming)
  rpc ReportResult(ActionResult) returns (Ack);

  // Request task execution
  rpc ExecuteTask(ExecuteTaskRequest) returns (ExecuteTaskResponse);

  // Cancel running task
  rpc CancelTask(CancelTaskRequest) returns (CancelTaskResponse);

  // Get fleet state snapshot
  rpc GetFleetState(FleetStateRequest) returns (FleetStateResponse);
}

// ============================================================
// Agent → Server Messages
// ============================================================

message AgentMessage {
  string agent_id = 1;
  int64 timestamp_ms = 2;

  oneof payload {
    AgentHeartbeat heartbeat = 10;
    ActionResult action_result = 11;
    AgentStatusUpdate status_update = 12;
    AgentStateUpdate state_update = 13; // Enhanced state update
    TaskLog task_log = 14;              // Task execution logs
    TaskStateUpdate task_state = 15;    // Agent-driven task state update
  }
}

// Enhanced state update message for cross-agent state tracking
message AgentStateUpdate {
  string agent_id = 1;
  string state_code = 2;           // Current state code (e.g., "pick:executing")
  repeated string semantic_tags = 3; // Current semantic tags
  string current_graph_id = 4;     // Currently executing action graph ID
  string current_step_id = 5;      // Current step being executed
  StatePhase phase = 6;            // Current phase

  enum StatePhase {
    PHASE_UNKNOWN = 0;
    PHASE_IDLE = 1;
    PHASE_EXECUTING = 2;
    PHASE_SUCCESS = 3;
    PHASE_FAILED = 4;
  }
}

message AgentHeartbeat {
  string agent_id = 1;
  string state = 2;
  bool is_executing = 3;
  string current_action = 4;
  uint32 network_latency_ms = 5;
  uint32 network_latency_us = 6;

  // Enhanced state information
  string state_code = 7;           // Current state code (e.g., "pick:executing")
  repeated string semantic_tags = 8; // Current semantic tags
  string current_graph_id = 9;     // Currently executing action graph ID
  string current_task_id = 10;
  string current_step_id = 11;

  // Telemetry payload for parameter loading
  TelemetryPayload telemetry = 12;
}

message AgentStatusUpdate {
  AgentState state = 1;
  bool is_online = 2;
  string message = 3;
}

enum AgentState {
  AGENT_UNKNOWN = 0;
  AGENT_ONLINE = 1;
  AGENT_OFFLINE = 2;
  AGENT_RECONNECTING = 3;
}

// ============================================================
// Lifecycle State (ROS2 Lifecycle Node)
// ============================================================

enum LifecycleState {
  LIFECYCLE_STATE_UNKNOWN = 0;
  LIFECYCLE_STATE_UNCONFIGURED = 1;
  LIFECYCLE_STATE_INACTIVE = 2;
  LIFECYCLE_STATE_ACTIVE = 3;
  LIFECYCLE_STATE_FINALIZED = 4;
}

// ============================================================
// Server → Agent Messages
// ============================================================

message ServerMessage {
  string message_id = 1;
  int64 sequence = 2;
  int64 timestamp_ms = 3;

  oneof payload {
    ExecuteCommand execute = 10;
    CancelCommand cancel = 11;
    ServerAck ack = 12;
    ConfigUpdate config_update = 13;
    FleetStateUpdate fleet_state_update = 14; // Broadcast fleet state changes
    DeployGraphCommand deploy_graph = 15;     // Deploy action graph with states
    StartTaskCommand start_task = 16;         // Agent-driven task execution
  }
}

// Fleet state update broadcast to agents for cross-agent precondition evaluation
message FleetStateUpdate {
  int64 timestamp_ms = 1;
  repeated AgentStateEntry agents = 2;
}

message AgentStateEntry {
  string agent_id = 1;
  string state_code = 2;
  repeated string semantic_tags = 3;
  string current_graph_id = 4;
  bool is_online = 5;
  bool is_executing = 6;
  float staleness_sec = 7;           // Staleness in seconds since last update
  string state = 8;                  // Current state name (e.g., "idle", "executing")
}

// Deploy action graph command with states
message DeployGraphCommand {
  string command_id = 1;
  string agent_id = 2;
  string action_graph_id = 3;
  int32 version = 4;
  bytes graph_json = 5;            // Complete canonical graph JSON
  repeated GraphState states = 6;   // Graph states for state management
  string checksum = 7;
}

// Graph state definition
message GraphState {
  string code = 1;                 // State code (e.g., "pick:executing")
  string name = 2;                 // Human-readable name
  string type = 3;                 // "system" or "graph"
  string step_id = 4;              // Associated step ID (for graph states)
  string phase = 5;                // Phase: "idle", "executing", "success", "failed"
  string color = 6;                // UI color
  string description = 7;          // Description
  repeated string semantic_tags = 8; // Semantic tags for cross-agent queries
}

message ExecuteCommand {
  string command_id = 1;
  string agent_id = 2;
  string task_id = 3;
  string step_id = 4;
  string action_type = 5;      // e.g., "nav2_msgs/NavigateToPose"
  string action_server = 6;    // e.g., "/navigate_to_pose"
  bytes params = 7;            // JSON-encoded parameters
  float timeout_sec = 8;
  int64 deadline_ms = 9;       // Absolute deadline timestamp
}

message CancelCommand {
  string command_id = 1;
  string agent_id = 2;
  string task_id = 3;
  string reason = 4;
}

message ServerAck {
  string acked_message_id = 1;
  bool success = 2;
  string error = 3;
}

message ConfigUpdate {
  string agent_id = 1;
  bytes state_definition = 2;  // JSON-encoded state definition
  int32 version = 3;
}

// ============================================================
// Action Result
// ============================================================

message ActionResult {
  string command_id = 1;
  string agent_id = 2;
  string task_id = 3;
  string step_id = 4;
  ActionStatus status = 5;
  bytes result = 6;            // JSON-encoded result
  string error = 7;
  int64 started_at_ms = 8;
  int64 completed_at_ms = 9;
}

enum ActionStatus {
  ACTION_UNKNOWN = 0;
  ACTION_SUCCEEDED = 1;
  ACTION_FAILED = 2;
  ACTION_CANCELLED = 3;
  ACTION_TIMEOUT = 4;
  ACTION_REJECTED = 5;
}

// ============================================================
// Registration
// ============================================================

message RegisterAgentRequest {
  string agent_id = 1;              // Empty = request server assignment
  string name = 2;
  string namespace = 3;             // ROS namespace
  string client_version = 4;
  string hardware_fingerprint = 5;  // For ID recovery on reconnection
}

message RegisterAgentResponse {
  bool success = 1;
  string error = 2;
  AgentConfig config = 3;
  int64 server_time_ms = 4;
  string assigned_agent_id = 5;     // Server-assigned ID (if id_was_assigned)
  bool id_was_assigned = 6;         // True if server assigned the ID
}

message AgentConfig {
  string agent_id = 1;
  bytes state_definition = 2;
  bytes action_definitions = 3;
}

// ============================================================
// Task Execution
// ============================================================

message ExecuteTaskRequest {
  string action_graph_id = 1;
  string agent_id = 2;
  bytes params = 3;            // JSON-encoded parameters
  string requester = 4;
}

message ExecuteTaskResponse {
  bool success = 1;
  string task_id = 2;
  string error = 3;
}

message CancelTaskRequest {
  string task_id = 1;
  string reason = 2;
}

message CancelTaskResponse {
  bool success = 1;
  string error = 2;
}

// ============================================================
// Fleet State
// ============================================================

message FleetStateRequest {
  repeated string agent_ids = 1;  // Empty = all agents
  bool include_zones = 2;
}

message FleetStateResponse {
  int64 timestamp_ms = 1;
  map<string, AgentStateSnapshot> agents = 2;
  repeated ZoneReservation zones = 3;
}

message AgentStateSnapshot {
  string agent_id = 1;
  string agent_name = 2;
  reserved 3;
  reserved 4;
  string state = 5;
  bool is_online = 6;
  bool is_executing = 7;
  float staleness_sec = 8;
  reserved 9, 10;
  optional string current_task_id = 11;
  optional string current_step_id = 12;
  string namespace = 13;

  // Enhanced state information
  string state_code = 14;            // Current state code (e.g., "pick:executing")
  repeated string semantic_tags = 15; // Current semantic tags
  string current_graph_id = 16;      // Currently executing action graph ID
}

message ZoneReservation {
  string zone_id = 1;
  string agent_id = 2;
  int64 reserved_at_ms = 3;
  int64 expires_at_ms = 4;
}

// ============================================================
// Common Types
// ============================================================

message Ack {
  bool success = 1;
  string message_id = 2;
  string error = 3;
}

// ============================================================
// Telemetry Types for Parameter Loading
// ============================================================

// 3D Vector
message Vector3 {
  double x = 1;
  double y = 2;
  double z = 3;
}

// Quaternion orientation
message Quaternion {
  double x = 1;
  double y = 2;
  double z = 3;
  double w = 4;
}

// Pose (position + orientation)
message Pose {
  Vector3 position = 1;
  Quaternion orientation = 2;
}

// Twist (linear + angular velocity)
message Twist {
  Vector3 linear = 1;
  Vector3 angular = 2;
}

// JointState telemetry
message JointStateData {
  repeated string name = 1;
  repeated double position = 2;
  repeated double velocity = 3;
  repeated double effort = 4;
  int64 timestamp_ns = 5;
  string topic_name = 6;  // ROS2 topic name (e.g., "/robot_001/joint_states")
}

// Transform telemetry
message TransformData {
  string frame_id = 1;
  string child_frame_id = 2;
  Vector3 translation = 3;
  Quaternion rotation = 4;
  int64 timestamp_ns = 5;
}

// Odometry telemetry
message OdometryData {
  string frame_id = 1;
  string child_frame_id = 2;
  Pose pose = 3;
  Twist twist = 4;
  int64 timestamp_ns = 5;
  string topic_name = 6;  // ROS2 topic name (e.g., "/robot_001/odom")
}

// Combined telemetry payload per robot
message TelemetryPayload {
  string robot_id = 1;
  JointStateData joint_state = 2;
  repeated TransformData transforms = 3;
  OdometryData odometry = 4;
  int64 collected_at_ns = 5;
}

// ============================================================
// Enhanced Preconditions for Cross-Agent State Checking
// ============================================================

message EnhancedPrecondition {
  PreconditionType type = 1;
  string target_agent_id = 2;      // For agent_state type
  string expected_state = 3;       // Expected state code
  PreconditionFilter filter = 4;   // For semantic_tag and any_agent_state types
  PreconditionOperator operator = 5;

  enum PreconditionType {
    PRECONDITION_UNKNOWN = 0;
    SELF_STATE = 1;         // Check own agent's state
    AGENT_STATE = 2;        // Check specific agent's state
    SEMANTIC_TAG = 3;       // Check agents with semantic tag
    ANY_AGENT_STATE = 4;    // Check any agent matching filter
  }

  enum PreconditionOperator {
    OP_EQUALS = 0;
    OP_NOT_EQUALS = 1;
    OP_IN = 2;
    OP_NOT_IN = 3;
    OP_HAS_TAG = 4;
    OP_NOT_HAS_TAG = 5;
  }
}

message PreconditionFilter {
  string graph_id = 1;             // Filter by action graph ID
  string capability = 2;           // Filter by capability
  repeated string tags = 3;        // Filter by semantic tags
  bool online_only = 4;            // Only check online agents
  bool executing_only = 5;         // Only check executing agents
  bool include_self = 6;           // Include self in query
}

message PreconditionResult {
  bool satisfied = 1;
  string reason = 2;               // Reason if not satisfied
  repeated string matched_agents = 3; // Agents that matched the filter
}

// ============================================================
// Task Execution Logs
// ============================================================

enum TaskLogLevel {
  TASK_LOG_DEBUG = 0;
  TASK_LOG_INFO = 1;
  TASK_LOG_WARN = 2;
  TASK_LOG_ERROR = 3;
}

message TaskLog {
  string agent_id = 1;
  string task_id = 2;
  string step_id = 3;
  string command_id = 4;
  TaskLogLevel level = 5;
  string message = 6;
  int64 timestamp_ms = 7;
  string component = 8;            // e.g., "CommandProcessor", "ActionExecutor"
  map<string, string> metadata = 9; // Additional context
}

// ============================================================
// Agent-Driven Task Execution
// ============================================================

enum TaskState {
  TASK_STATE_UNKNOWN = 0;
  TASK_STATE_PENDING = 1;
  TASK_STATE_RUNNING = 2;
  TASK_STATE_WAITING_PRECONDITION = 3;
  TASK_STATE_EXECUTING_ACTION = 4;
  TASK_STATE_COMPLETED = 5;
  TASK_STATE_FAILED = 6;
  TASK_STATE_CANCELLED = 7;
}

// Server → Agent: Start task command (agent-driven execution)
message StartTaskCommand {
  string task_id = 1;
  string graph_id = 2;
  string robot_id = 3;
  map<string, string> params = 4;
}

// Agent → Server: Task state update (agent-driven execution)
message TaskStateUpdate {
  string task_id = 1;
  string current_step_id = 2;
  TaskState state = 3;
  float progress = 4;                   // 0.0 - 1.0
  string blocking_reason = 5;           // Why task is waiting
  map<string, string> variables = 6;    // Step result variables

  // Step completion info (when a step finishes)
  StepResultInfo step_result = 7;

  int64 timestamp_ms = 8;
}

// Step result info (included in TaskStateUpdate)
message StepResultInfo {
  string step_id = 1;
  ActionStatus status = 2;
  bytes result_json = 3;               // JSON-encoded result data
  string error = 4;
  int64 duration_ms = 5;
}
