# Fleet Agent Configuration
# 환경변수로 오버라이드 가능: ${VAR:-default}
#
# 사용법:
#   ros2 launch fleet_agent_cpp fleet_agent.launch.py server_ip:=192.168.0.100
#   ros2 launch fleet_agent_cpp fleet_agent.launch.py server_ip:=192.168.0.100 agent_id:=agent_02

# Agent identification
agent:
  id: "${FLEET_AGENT_ID:-agent_01}"
  name: "Fleet Agent"

# Server connection
server:
  url: "http://${FLEET_SERVER_IP:-localhost}:8081"
  quic:
    server_address: "${FLEET_SERVER_IP:-localhost}"
    server_port: ${FLEET_SERVER_PORT:-9444}
    alpn: "fleet-agent-raw"
    # 인증서 경로 (패키지 상대 경로 사용)
    ca_cert: "${FLEET_AGENT_PKG_PATH:-/etc/fleet_agent}/certs/ca.crt"
    client_cert: "${FLEET_AGENT_PKG_PATH:-/etc/fleet_agent}/certs/agent.crt"
    client_key: "${FLEET_AGENT_PKG_PATH:-/etc/fleet_agent}/certs/agent.key"
    idle_timeout_ms: 30000
    keepalive_interval_ms: 10000
    handshake_timeout_ms: 10000
    max_bidi_streams: 1000
    max_uni_streams: 100
    enable_0rtt: true
    enable_datagrams: true

# Communication settings
communication:
  heartbeat_interval_ms: 1000
  command_timeout_sec: 30

# Execution settings
execution:
  action_default_timeout_sec: 120.0
  precondition_check_interval_ms: 100
  max_concurrent_per_robot: 1

# Storage paths
storage:
  action_graphs_path: "/tmp/fleet_agent/graphs"
  state_definitions_path: "/tmp/fleet_agent/state_definitions"
  state_persistence_path: "/tmp/fleet_agent/state"
  message_queue_path: "/tmp/fleet_agent/queue"
  enable_state_persistence: false
  enable_message_persistence: false

# ROS settings
ros:
  node_name: "fleet_agent"
  use_intra_process: true
  executor_thread_count: 2

# Logging
logging:
  level: "${FLEET_LOG_LEVEL:-info}"
  file: ""
  console: true
  include_timestamp: true

# Robots (optional) - declare IDs and namespaces for execution
# robots:
#   - id: "robot_001"
#     name: "AMR Robot 1"
#     namespace: "/robot_001"
