// Command message definitions

syntax = "proto3";

package fleet.v1;

import "fleet/v1/common.proto";

option cc_enable_arenas = true;

// ============================================================
// Server → Agent: Execute Command
// ============================================================

message ExecuteCommand {
  string command_id = 1;
  string agent_id = 2;
  string task_id = 3;
  string step_id = 4;
  string action_type = 5;      // e.g., "nav2_msgs/NavigateToPose"
  string action_server = 6;    // e.g., "/robot_001/navigate_to_pose"
  bytes params = 7;            // JSON-encoded parameters
  float timeout_sec = 8;
  int64 deadline_ms = 9;       // Absolute deadline timestamp

  // Optional: Start conditions (AND/OR list)
  repeated StartCondition start_conditions = 10;

  // Explicit state transitions for this step
  repeated string during_states = 11;
  repeated string success_states = 12;
  repeated string failure_states = 13;
}

// ============================================================
// Server → Agent: Cancel Command
// ============================================================

message CancelCommand {
  string command_id = 1;
  string agent_id = 2;
  string task_id = 3;
  string reason = 4;
}

// ============================================================
// Server → Agent: Ping
// ============================================================

message PingRequest {
  string ping_id = 1;
  int64 timestamp_ms = 2;
}

// ============================================================
// Agent → Server: Pong
// ============================================================

message PongResponse {
  string ping_id = 1;
  int64 server_timestamp_ms = 2;
  int64 agent_timestamp_ms = 3;
}

// ============================================================
// Agent → Server: Action Result
// ============================================================

message ActionResult {
  string command_id = 1;
  string agent_id = 2;
  string task_id = 3;
  string step_id = 4;
  ActionStatus status = 5;
  bytes result = 6;            // JSON-encoded result
  string error = 7;
  int64 started_at_ms = 8;
  int64 completed_at_ms = 9;
}

// ============================================================
// Agent → Server: Action Feedback
// ============================================================

message ActionFeedback {
  string command_id = 1;
  string agent_id = 2;
  string task_id = 3;
  string step_id = 4;
  float progress = 5;          // 0.0 - 1.0
  bytes feedback = 6;          // JSON-encoded feedback data
  int64 timestamp_ms = 7;
}

// ============================================================
// Server → Agent: Config Update
// ============================================================

message ConfigUpdate {
  string agent_id = 1;
  bytes state_definition = 2;  // JSON-encoded state definition
  int32 version = 3;
}

// ============================================================
// Agent → Server: Config Update Acknowledgement
// ============================================================

message ConfigUpdateAck {
  string agent_id = 1;
  int32 version = 2;
  bool success = 3;
  string error = 4;
}

// ============================================================
// Agent → Server: Task Execution Log
// ============================================================

enum TaskLogLevel {
  TASK_LOG_DEBUG = 0;
  TASK_LOG_INFO = 1;
  TASK_LOG_WARN = 2;
  TASK_LOG_ERROR = 3;
}

message TaskLog {
  string agent_id = 1;
  string task_id = 2;
  string step_id = 3;
  string command_id = 4;
  TaskLogLevel level = 5;
  string message = 6;
  int64 timestamp_ms = 7;
  string component = 8;      // e.g., "CommandProcessor", "ActionExecutor"
  map<string, string> metadata = 9;  // Additional context
}

// ============================================================
// Server → Agent: Start Task Command (Agent-driven execution)
// ============================================================

message StartTaskCommand {
  string task_id = 1;
  string graph_id = 2;
  string robot_id = 3;
  map<string, string> params = 4;
}

// ============================================================
// Agent → Server: Task State Update (Agent-driven execution)
// ============================================================

message TaskStateUpdate {
  string task_id = 1;
  string current_step_id = 2;
  TaskState state = 3;
  float progress = 4;                   // 0.0 - 1.0
  string blocking_reason = 5;           // Why task is waiting
  map<string, string> variables = 6;    // Step result variables

  // Step completion info (when a step finishes)
  StepResultInfo step_result = 7;

  int64 timestamp_ms = 8;
}

// ============================================================
// Step Result Info (included in TaskStateUpdate)
// ============================================================

message StepResultInfo {
  string step_id = 1;
  ActionStatus status = 2;
  bytes result_json = 3;               // JSON-encoded result data
  string error = 4;
  int64 duration_ms = 5;
}
