// Common types used across all proto files

syntax = "proto3";

package fleet.v1;

option cc_enable_arenas = true;

// ============================================================
// Common Types
// ============================================================

message Timestamp {
  int64 seconds = 1;
  int32 nanos = 2;
}

// ============================================================
// Lifecycle State (ROS2 Lifecycle Node)
// ============================================================

enum LifecycleState {
  LIFECYCLE_STATE_UNKNOWN = 0;
  LIFECYCLE_STATE_UNCONFIGURED = 1;
  LIFECYCLE_STATE_INACTIVE = 2;
  LIFECYCLE_STATE_ACTIVE = 3;
  LIFECYCLE_STATE_FINALIZED = 4;
}

// ============================================================
// Start Conditions
// ============================================================

message StartCondition {
  string id = 1;
  string operator = 2;         // and, or
  string quantifier = 3;       // self, all, any, none, specific
  string target_type = 4;      // self, robot, agent, all
  string robot_id = 5;
  string agent_id = 6;
  string state = 7;
  string state_operator = 8;   // ==, !=, in, not_in
  repeated string allowed_states = 9;
  float max_staleness_sec = 10;
  bool require_online = 11;
  string message = 12;
}

// ============================================================
// Robot State
// ============================================================

enum RobotState {
  ROBOT_STATE_UNKNOWN = 0;
  ROBOT_STATE_IDLE = 1;
  ROBOT_STATE_EXECUTING = 2;
  ROBOT_STATE_ERROR = 3;
  ROBOT_STATE_CHARGING = 4;
  ROBOT_STATE_MANUAL = 5;
  ROBOT_STATE_EMERGENCY = 6;
}

// ============================================================
// Action Status
// ============================================================

enum ActionStatus {
  ACTION_STATUS_UNKNOWN = 0;
  ACTION_STATUS_SUCCEEDED = 1;
  ACTION_STATUS_FAILED = 2;
  ACTION_STATUS_CANCELLED = 3;
  ACTION_STATUS_TIMEOUT = 4;
  ACTION_STATUS_REJECTED = 5;
}

// ============================================================
// Agent State
// ============================================================

enum AgentState {
  AGENT_STATE_UNKNOWN = 0;
  AGENT_STATE_ONLINE = 1;
  AGENT_STATE_OFFLINE = 2;
  AGENT_STATE_RECONNECTING = 3;
}

// ============================================================
// Graph Execution State
// ============================================================

enum GraphExecutionState {
  GRAPH_EXECUTION_UNKNOWN = 0;
  GRAPH_EXECUTION_RUNNING = 1;
  GRAPH_EXECUTION_COMPLETED = 2;
  GRAPH_EXECUTION_FAILED = 3;
  GRAPH_EXECUTION_CANCELLED = 4;
  GRAPH_EXECUTION_PAUSED = 5;
}

// ============================================================
// Task State (Agent-driven execution)
// ============================================================

enum TaskState {
  TASK_STATE_UNKNOWN = 0;
  TASK_STATE_PENDING = 1;
  TASK_STATE_RUNNING = 2;
  TASK_STATE_WAITING_PRECONDITION = 3;
  TASK_STATE_EXECUTING_ACTION = 4;
  TASK_STATE_COMPLETED = 5;
  TASK_STATE_FAILED = 6;
  TASK_STATE_CANCELLED = 7;
}

// ============================================================
// Generic Acknowledgement
// ============================================================

message Ack {
  bool success = 1;
  string message_id = 2;
  string error = 3;
}

// ============================================================
// Telemetry Types for Parameter Loading
// ============================================================

// 3D Vector
message Vector3 {
  double x = 1;
  double y = 2;
  double z = 3;
}

// Quaternion orientation
message Quaternion {
  double x = 1;
  double y = 2;
  double z = 3;
  double w = 4;
}

// Pose (position + orientation)
message Pose {
  Vector3 position = 1;
  Quaternion orientation = 2;
}

// Twist (linear + angular velocity)
message Twist {
  Vector3 linear = 1;
  Vector3 angular = 2;
}

// JointState telemetry
message JointStateData {
  repeated string name = 1;
  repeated double position = 2;
  repeated double velocity = 3;
  repeated double effort = 4;
  int64 timestamp_ns = 5;
  string topic_name = 6;  // ROS2 topic name (e.g., "/robot_001/joint_states")
}

// Transform telemetry
message TransformData {
  string frame_id = 1;
  string child_frame_id = 2;
  Vector3 translation = 3;
  Quaternion rotation = 4;
  int64 timestamp_ns = 5;
}

// Odometry telemetry
message OdometryData {
  string frame_id = 1;
  string child_frame_id = 2;
  Pose pose = 3;
  Twist twist = 4;
  int64 timestamp_ns = 5;
  string topic_name = 6;  // ROS2 topic name (e.g., "/robot_001/odom")
}

// Combined telemetry payload per robot
message TelemetryPayload {
  string robot_id = 1;
  JointStateData joint_state = 2;
  repeated TransformData transforms = 3;
  OdometryData odometry = 4;
  int64 collected_at_ns = 5;
}
