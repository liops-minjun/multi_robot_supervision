// Action Graph message definitions

syntax = "proto3";

package fleet.v1;

import "fleet/v1/common.proto";

option cc_enable_arenas = true;

// ============================================================
// Canonical Action Graph Format
// ============================================================

message ActionGraph {
  string schema_version = 1;       // "1.0.0"
  ActionGraphMetadata metadata = 2;
  repeated Vertex vertices = 3;
  repeated Edge edges = 4;
  string entry_point = 5;          // Starting vertex ID
  string checksum = 6;             // "sha256:..."
  string graph_json = 20;          // Canonical JSON payload (server-side)
}

message ActionGraphMetadata {
  string id = 1;
  string name = 2;
  int32 version = 3;
  string description = 4;
  int64 created_at_ms = 5;
  int64 updated_at_ms = 6;
  map<string, string> tags = 7;
}

// ============================================================
// Vertex Types
// ============================================================

message Vertex {
  string id = 1;
  VertexType type = 2;

  oneof vertex_data {
    StepVertex step = 3;
    TerminalVertex terminal = 4;
  }
}

enum VertexType {
  VERTEX_TYPE_UNKNOWN = 0;
  VERTEX_TYPE_STEP = 1;
  VERTEX_TYPE_TERMINAL = 2;
}

// ============================================================
// Step Vertex
// ============================================================

message StepVertex {
  StepType step_type = 1;

  oneof step_data {
    ActionStep action = 2;
    WaitStep wait = 3;
    ConditionStep condition = 4;
  }

  // Common step properties
  string name = 10;
  string description = 11;
  repeated StartCondition start_conditions = 12;  // Multi-robot coordination
  map<string, string> params = 13;                // Step parameters

  // State management
  repeated string pre_states = 14;
  repeated string during_states = 15;
  repeated string success_states = 16;
  repeated string failure_states = 17;
}

enum StepType {
  STEP_TYPE_UNKNOWN = 0;
  STEP_TYPE_ACTION = 1;
  STEP_TYPE_WAIT = 2;
  STEP_TYPE_CONDITION = 3;
}

message ActionStep {
  string action_type = 1;       // "nav2_msgs/NavigateToPose"
  string action_server = 2;     // "/navigate_to_pose" (optional, auto-resolved)
  float timeout_sec = 3;
  bytes goal_params = 4;        // JSON-encoded goal parameters
}

message WaitStep {
  float duration_sec = 1;
  optional string condition = 2;  // Optional wait-for condition
}

message ConditionStep {
  string expression = 1;          // Condition expression to evaluate
  repeated ConditionalBranch branches = 2;
}

message ConditionalBranch {
  string condition = 1;           // Condition for this branch
  string next_vertex_id = 2;      // Target vertex if condition met
}

// ============================================================
// Terminal Vertex
// ============================================================

message TerminalVertex {
  TerminalType terminal_type = 1;
  string message = 2;
}

enum TerminalType {
  TERMINAL_TYPE_UNKNOWN = 0;
  TERMINAL_TYPE_SUCCESS = 1;
  TERMINAL_TYPE_FAILURE = 2;
}

// ============================================================
// Edge
// ============================================================

message Edge {
  string from_vertex = 1;
  string to_vertex = 2;
  EdgeType type = 3;
  optional string condition = 4;  // Optional edge condition
}

enum EdgeType {
  EDGE_TYPE_UNKNOWN = 0;
  EDGE_TYPE_ON_SUCCESS = 1;
  EDGE_TYPE_ON_FAILURE = 2;
  EDGE_TYPE_ON_TIMEOUT = 3;
  EDGE_TYPE_CONDITIONAL = 4;
}

// ============================================================
// Graph Deployment Messages
// ============================================================

message DeployGraphRequest {
  string correlation_id = 1;
  ActionGraph graph = 2;
  bool force = 3;              // Overwrite if exists
}

message DeployGraphResponse {
  string correlation_id = 1;
  bool success = 2;
  string error = 3;
  string graph_id = 4;
  int32 deployed_version = 5;
  string checksum = 6;
}

// ============================================================
// Graph Execution Messages
// ============================================================

message ExecuteGraphRequest {
  string correlation_id = 1;
  string execution_id = 2;
  string graph_id = 3;
  string robot_id = 4;
  bytes params = 5;            // JSON-encoded execution parameters
}

message GraphExecutionStatus {
  string execution_id = 1;
  string graph_id = 2;
  string robot_id = 3;
  GraphExecutionState state = 4;

  // Current position in graph
  string current_vertex_id = 5;
  int32 current_step_index = 6;

  // Progress and timing
  float progress = 7;
  int64 started_at_ms = 8;
  int64 updated_at_ms = 9;
  optional int64 completed_at_ms = 10;

  // Error info
  optional string error = 11;
  optional string failed_vertex_id = 12;
}
